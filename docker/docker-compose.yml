services:
  api: 
    build: 
      context: ..
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file: ../.env
    volumes:
      - vector_store:/app/vector_store
      - document_store:/app/data/documents
      - registry_db:/app/registry.db
  
  ui:
    build: 
      context: ..
      dockerfile: Dockerfile.ui
    ports: 
      - "8501:8501"
    environment:
      - RAGNAR_API_URL=http://api:8000
    depends_on:
      - api

volumes:
  vector_store:
  document_store:
  registry_db:
