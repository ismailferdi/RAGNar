name: CI
on: [push, pull_request]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: actions/setup-python@v4
              with:
                    python-version: "3.14"
                    cache: pip
            - run: pip install -r requirements.txt
            - run: cp ci.env .env
            - run: ruff check .
            - run: pytest tests/ -v --tb=short